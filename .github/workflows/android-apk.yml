name: Build Android APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Build debug APK
        run: gradle --stacktrace --no-daemon assembleDebug

      - name: Verify APK output
        run: |
          shopt -s nullglob
          apks=(app/build/outputs/apk/debug/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No debug APK found in app/build/outputs/apk/debug"
            exit 1
          fi
          printf 'Found APK(s):\n%s\n' "${apks[@]}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: maks-island-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Build summary
        run: |
          {
            echo "## Android APK Build";
            echo "- Variant: debug";
            echo "- Artifact: \`maks-island-debug-apk\`";
            echo "- APK path: \`app/build/outputs/apk/debug/*.apk\`";
          } >> "$GITHUB_STEP_SUMMARY"
